{% extends 'blog/base.html' %}
{% block content %}
<h2>Form</h2>
<form method="POST" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}
  {% if u_form %}{{ u_form.as_p }}{% endif %}
  {% if p_form %}{{ p_form.as_p }}{% endif %}
  <button class="btn btn-primary" type="submit">Submit</button>
</form>
{% endblock %}
